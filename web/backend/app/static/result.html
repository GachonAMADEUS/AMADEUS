<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Result - Amadeus</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="result-layout">
      <aside class="result-sidebar">
        <p class="eyebrow">Amadeus result</p>
        <h1>3D 모델 뷰포트</h1>
        <p>
          생성된 STL 모델을 회전, 확대, 이동하며 확인합니다.
        </p>
        <dl>
          <div>
            <dt>상태</dt>
            <dd id="resultStatus">완료</dd>
          </div>
          <div>
            <dt>모델</dt>
            <dd id="modelName">Prototype mesh</dd>
          </div>
        </dl>
        <label class="model-picker" for="modelSelect">
          <span>Static STL 선택</span>
          <select id="modelSelect">
            <option value="">Prototype mesh</option>
          </select>
        </label>
        <div class="download-group" aria-label="Pipeline outputs">
          <a id="downloadStl" class="download-link disabled" href="#">STL 다운로드</a>
          <a id="downloadReportJson" class="download-link disabled" href="#">JSON 리포트</a>
          <a id="downloadReportTxt" class="download-link disabled" href="#">TXT 리포트</a>
        </div>
        <p id="resultMessage" class="status-text"></p>
        <a href="/" class="secondary-action">새 영상 업로드</a>
      </aside>

      <section class="viewer-wrap" aria-label="3D model viewer">
        <canvas id="viewer"></canvas>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.169.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="/static/result.js"></script>
  </body>
</html>
