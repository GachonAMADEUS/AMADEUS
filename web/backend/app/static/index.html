<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Amadeus Prototype</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell upload-shell">
      <section class="brand-panel">
        <p class="eyebrow">3D foot reconstruction prototype</p>
        <h1>Amadeus</h1>
        <p class="lead">
          맨발 360도 촬영 영상을 업로드하면, 프로토타입 처리 과정을 거쳐 3D 결과 화면을 확인합니다.
        </p>
      </section>

      <section class="tool-panel" aria-label="Video upload">
        <div class="panel-heading">
          <span class="step-mark">01</span>
          <div>
            <h2>MP4 업로드</h2>
          </div>
        </div>

        <form id="uploadForm" class="upload-form" novalidate>
          <label class="drop-zone" for="videoFile">
            <input id="videoFile" name="file" type="file" accept="video/mp4" />
            <span class="upload-icon">+</span>
            <strong id="fileLabel">맨발 360도 촬영 영상 선택</strong>
            <small>.mp4 파일만 업로드할 수 있습니다.</small>
          </label>

          <button id="uploadButton" type="submit">업로드 시작</button>
          <p id="uploadStatus" class="status-text" role="status"></p>
        </form>
      </section>
    </main>

    <script src="/static/upload.js"></script>
  </body>
</html>
